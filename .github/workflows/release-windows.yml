name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install --upgrade -r requirements-build.txt

      - name: Build and test
        shell: pwsh
        run: .\build_windows.ps1 -SkipInstall

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: UmaLegacyLinker-Windows
          path: |
            dist/UmaLegacyLinker.exe
            dist/UmaLegacyLinker.exe.sha256

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag dist/UmaLegacyLinker.exe dist/UmaLegacyLinker.exe.sha256 --clobber
          } else {
            gh release create $tag dist/UmaLegacyLinker.exe dist/UmaLegacyLinker.exe.sha256 --generate-notes --title "$tag"
          }
